services:
  postgres:
    image: postgres:16-alpine
    container_name: coachai_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coachai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coachai_dev}
      POSTGRES_DB: ${POSTGRES_DB:-coachai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coachai}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: coachai_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_dev}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coachai_backend
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: coachai_frontend
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

  judge:
    build:
      context: ./judge
      dockerfile: Dockerfile
    container_name: coachai_judge
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./judge:/app
      - /tmp:/tmp
    ports:
      - "8001:8001"
    depends_on:
      - redis
    privileged: true

  # Sandbox images — built once, used by the judge
  sandbox-python:
    build:
      context: ./infra/sandboxes/python
      dockerfile: Dockerfile
    image: coachai-sandbox-python:latest
    profiles: ["build-sandboxes"]

  sandbox-sql:
    build:
      context: ./infra/sandboxes/sql
      dockerfile: Dockerfile
    image: coachai-sandbox-sql:latest
    profiles: ["build-sandboxes"]

  sandbox-r:
    build:
      context: ./infra/sandboxes/r
      dockerfile: Dockerfile
    image: coachai-sandbox-r:latest
    profiles: ["build-sandboxes"]

volumes:
  postgres_data:
  redis_data:
